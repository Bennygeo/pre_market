name: NSE Premarket Report

on:
  schedule:
    #  GitHub cron is UTC — 9:00 AM IST = 3:30 AM UTC
    #  We start at 3:30 UTC so snapshot1 = ~9:00 IST, snapshot2 = ~9:02 IST
    - cron: '30 3 * * 1-5'   # Mon–Fri only

  workflow_dispatch:          # allows manual trigger from GitHub UI for testing

jobs:
  send-report:
    runs-on: ubuntu-latest

    env:
      GMAIL_SENDER:  ${{ secrets.GMAIL_SENDER }}
      GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
      REPORT_TO:     ${{ secrets.REPORT_TO }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz schedule

      - name: Run premarket report
        run: python main.py --run-once